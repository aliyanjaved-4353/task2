<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Billing Page</title>

    <style>
        body {
            background-color: black;
            color: white;
            font-family: Arial;
            padding: 20px;
        }
        table {
            width: 50%;
            border-collapse: collapse;
        }
        table, th, td {
            border: 1px solid rgb(186, 226, 43);
        }
        th, td {
            padding: 10px;
            text-align: center;
        }
        h1, h2 {
            color: rgb(186, 226, 43);
        }
    </style>
</head>

<body>
    <center>
    <h1>Delicious Food Corner</h1>
    <h2>Your Bill</h2>

    <table id="billTable">
        <thead>
            <tr>
                <th>Item</th>
                <th>Price</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <br>
    <div id="totalAmount" class="total">TOTAL: RS 0</div>
    <br><br>
    <button id="clearBtn" onclick="clearBill()">CLEAR BILL</button> 
    <button onclick="window.location.href='billingsystem.html'">HOME PAGE</button>
    </center>

<script>
    let data = JSON.parse(localStorage.getItem("billItems")) || [];
    let total = 0;

    const tableBody = document.getElementById("billTable").getElementsByTagName("tbody")[0];

    data.forEach(item => {
        let row = tableBody.insertRow();
        let c1 = row.insertCell(0);
        let c2 = row.insertCell(1);

        c1.textContent = item.name;
        c2.textContent = "RS " + item.price;

        total += item.price;
    });

    document.getElementById("totalAmount").textContent = "TOTAL: RS " + total;

    function clearBill() {
        localStorage.removeItem("billItems"); // remove saved items
        location.reload(); // refresh page
    }
</script>

</body>
</html>
